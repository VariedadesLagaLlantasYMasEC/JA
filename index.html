<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llantera - Servicio Profesional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script> </head>
<body>

    <header>
        <div class="logo">LLANTERA <span>EL PANA</span></div>
    </header>

    <main>
        <section class="hero">
            <h1>Seguridad en cada kilómetro</h1>
            <p>Expertos en llantas y mantenimiento automotriz.</p>
        </section>

        <section class="servicios">
            <div class="card">
                <i data-lucide="disc"></i>
                <h3>Llantas Nuevas</h3>
                <p>Las mejores marcas para tu auto o camioneta.</p>
            </div>
            <div class="card">
                <i data-lucide="settings-2"></i>
                <h3>Alineación</h3>
                <p>Tecnología de punta para un manejo suave.</p>
            </div>
            <div class="card">
                <i data-lucide="map-pin"></i>
                <h3>Ubicación</h3>
                <p>Quito, Ecuador. ¡Visítanos hoy!</p>
            </div>
        </section>
        
        <button class="btn-whatsapp" onclick="window.location.href='https://wa.me/tunumerodeteléfono'">
            Escríbenos por WhatsApp
        </button>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
