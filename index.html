<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variedades LAGA - Excelencia en cada detalle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos base para replicar el diseño de Nerd sin basura */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            min-h: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 90%;
            z-index: 1000;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
        }

        .logo span { color: #ff4d00; } /* El naranja de LAGA */

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                        url('TU_IMAGEN_DE_FONDO.jpg'); /* Pon aquí tu imagen de llantas */
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            margin-bottom: 10px;
            line-height: 1.1;
        }

        h1 span { color: #ff4d00; }

        .description {
            max-width: 600px;
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #ff4d00;
            color: white;
        }

        .btn-secondary {
            border: 2px solid white;
            color: white;
        }

        .btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

<header>
    <div class="logo">Variedades <span>LAGA</span></div>
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#nosotros">Quiénes Somos</a>
        <a href="#ubicacion">Ubicación</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<section class="hero">
    <h1>Excelencia en <br><span>cada detalle</span></h1>
    <p class="description">
        Tu seguridad en carretera es nuestra prioridad. En <b>Variedades LAGA</b>, ofrecemos llantas de alto rendimiento y servicios especializados para que cada viaje sea seguro y confortable.
    </p>
    <div class="buttons">
        <a href="#" class="btn btn-primary">CONÓCENOS</a>
        <a href="#" class="btn btn-secondary">CONTÁCTANOS</a>
    </div>
</section>

</body>
</html>
